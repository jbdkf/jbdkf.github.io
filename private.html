<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的产品说明书库</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        
        /* 密码输入框样式 */
        #login-box { margin-top: 100px; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        input[type="password"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #0366d6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0256c7; }

        /* 说明书内容区域（默认隐藏） */
        #secret-content { display: none; text-align: left; max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        .manual-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .manual-item h3 { margin: 0 0 10px 0; color: #333; }
        .manual-item a { color: #0366d6; text-decoration: none; }
    </style>
</head>
<body>

    <!-- 1. 登录区域 -->
    <div id="login-box">
        <h2>🔒 私人空间</h2>
        <p>请输入访问密码查看说明书</p>
        <input type="password" id="password-input" placeholder="输入密码...">
        <button onclick="checkPassword()">进入</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">密码错误，请重试！</p>
    </div>

    <!-- 2. 说明书内容区域 -->
    <div id="secret-content">
        <h2>📚 我的产品说明书</h2>
        
        <!-- 在这里添加你的说明书链接 -->
        <div class="manual-item">
            <h3>H2手持彩屏电焊机使用说明书.pdf</h3>
            <p>这是相机的中文使用手册，包含如何更换镜头和设置参数。</p>
            <!-- 这里的链接可以是百度网盘链接，或者你上传到GitHub的PDF文件链接 -->
            <a href="H2手持彩屏电焊机使用说明书.pdf">👉 点击查看 PDF 说明书</a>
        </div>

        <div class="manual-item">
            <h3>🚗 汽车 (Tesla Model 3)</h3>
            <p>车辆快速入门指南，包含蓝牙连接和 autopilot 设置。</p>
            <a href="#">👉 查看在线文档</a>
        </div>

        <div class="manual-item">
            <h3>内置4代万控射频板说明书.pdf</h3>
            <p>使用教程和更换指南。</p>
            <a href="内置4代万控射频板说明书.pdf">👉 点击查看 PDF 说明书</a>
        </div>

    </div>

    <script>
        // --- 设置你的密码在这里 ---
        const MY_PASSWORD = "sms2866916"; 

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === MY_PASSWORD) {
                // 密码正确：隐藏登录框，显示内容
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('secret-content').style.display = 'block';
            } else {
                // 密码错误：显示错误信息
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
