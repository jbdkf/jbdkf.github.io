<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 90%;
            margin-bottom: 60px;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .bio { color: #586069; margin-bottom: 30px; font-size: 16px; }
        
        /* 技能标签样式 */
        .tags { margin-bottom: 30px; }
        .tag {
            display: inline-block;
            background: #f1f8ff;
            color: #0366d6;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 0 5px 5px 0;
            border: 1px solid #c8e1ff;
        }

        /* 项目列表样式 */
        .projects { text-align: left; margin-top: 20px; }
        .projects h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eaecef; padding-bottom: 10px; }
        .project-item { margin-bottom: 10px; }
        .project-item a { font-weight: bold; display: block; margin-bottom: 2px; }
        .project-desc { font-size: 13px; color: #586069; margin: 0; }

        /* 底部样式 */
        footer {
            text-align: center;
            font-size: 13px;
            color: #959da5;
            padding: 10px;
        }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 头像和名字 -->
        <h1>👋 我是 [你的名字]</h1>
        <p class="bio">
            这里是我的互联网角落。<br>
            一名热爱折腾的开发者 / 设计师 / 创作者。
        </p>

        <!-- 2. 技能/兴趣标签 (填补空白的好帮手) -->
        <div class="tags">
            <span class="tag">📷 摄影</span>
            <span class="tag">💻 编程</span>
            <span class="tag">☕ 咖啡</span>
            <span class="tag">🚀 数码</span>
            <span class="tag">📝 写作</span>
        </div>

        <!-- 3. 项目/链接列表 (让页面看起来有内容) -->
        <div class="projects">
            <h3>🔥 近期项目</h3>
            
            <div class="project-item">
                <!-- 链接可以换成你的GitHub或其他网址 -->
                <a href="#">我的开源项目</a>
                <p class="project-desc">这是一个关于 xxx 的有趣项目，旨在解决 xxx 问题。</p>
            </div>

            <div class="project-item">
                <a href="#">我的博客文章</a>
                <p class="project-desc">分享一些技术心得和生活感悟。</p>
            </div>
        </div>
    </div>

    <!-- 4. 底部 -->
    <footer>
        <p>© 2024 [你的名字]. Made with Code & <a href="private.html">Coffee</a></p>
    </footer>

</body>
</html>
