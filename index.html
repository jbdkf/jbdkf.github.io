<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            align-items: center;
            /* 让内容垂直居中，但留出底部空间 */
            justify-content: center; 
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            margin-bottom: 50px; /* 给底部留点空隙，防止贴太近 */
        }
        h1 { 
            margin: 0 0 15px 0; 
            font-size: 24px;
        }
        p { 
            color: #586069; 
            line-height: 1.6; 
            margin: 0;
        }
        
        /* 底部样式 */
        footer {
            text-align: center;
            font-size: 13px;
            color: #959da5;
            padding: 10px;
        }
        
        /* 链接样式 */
        a {
            color: #0366d6;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
            color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- 中间主要内容区域 -->
    <div class="container">
        <!-- 这里可以改成你的昵称 -->
        <h1>👋 欢迎来到我的主页</h1>
        
        <!-- 这里可以写一句你的简介 -->
        <p>这里是我的互联网角落。<br>你可以在这里找到我的项目、联系方式或者关于我的一切。</p>
    </div>

    <!-- 底部区域 -->
    <footer>
        <!-- 记得把“你的名字”改成真的名字或昵称 -->
        <p>© 2024 你的名字。 Made with Code & <a href="private.html">Coffee</a></p>
    </footer>

</body>
</html>
