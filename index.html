<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; }
        p { color: #586069; line-height: 1.6; }
        
        /* 底部样式 */
        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #959da5;
        }
        
        /* 链接样式 */
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 欢迎来到我的主页</h1>
        <p>这里是我的互联网角落。</p>
        <p>你可以在这里找到我的项目、联系方式或者关于我的一切。</p>
    </div>

    <!-- 底部区域 -->
    <footer>
        <p>
            &copy; 2024 你的名字。 
            <br class="mobile-hide">
            Made with Code & 
            <!-- 下面是 Coffee 入口，点击跳转到 private.html -->
            <a href="private.html">Coffee</a>
        </p>
    </footer>

</body>
</html>
